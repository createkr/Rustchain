openapi: 3.0.0
info:
  title: RustChain Node API
  description: Public API documentation for the RustChain Node endpoints.
  version: 1.0.0
servers:
  - url: https://rustchain.org
    description: Public Live Node
paths:
  /health:
    get:
      summary: Node health check
      description: Returns health status, uptime, and version.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  uptime_s:
                    type: integer
                  version:
                    type: string
                  backup_age_hours:
                    type: number
                  db_rw:
                    type: boolean
                  tip_age_slots:
                    type: integer
              example:
                ok: true
                uptime_s: 58480
                version: "2.2.1-rip200"
                backup_age_hours: 13.65
                db_rw: true
                tip_age_slots: 0

  /ready:
    get:
      summary: Readiness probe
      description: Indicates if the node is fully synced and ready to serve traffic.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ready:
                    type: boolean
              example:
                ready: true

  /epoch:
    get:
      summary: Current epoch status
      description: Returns current epoch, slot, and enrolled miners.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  epoch:
                    type: integer
                  slot:
                    type: integer
                  enrolled_miners:
                    type: integer
                  blocks_per_epoch:
                    type: integer
                  epoch_pot:
                    type: number
                  total_supply_rtc:
                    type: number
              example:
                epoch: 91
                slot: 13227
                enrolled_miners: 20
                blocks_per_epoch: 144
                epoch_pot: 1.5
                total_supply_rtc: 8388608

  /api/miners:
    get:
      summary: Active miners
      description: Returns list of active miners with attestation data.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    miner_id:
                      type: string
                    attested:
                      type: boolean
              example:
                - miner_id: "m_12345"
                  attested: true

  /api/stats:
    get:
      summary: Network statistics
      description: Returns overall network statistics.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_blocks:
                    type: integer
                  total_transactions:
                    type: integer
              example:
                total_blocks: 150000
                total_transactions: 1205000

  /api/hall_of_fame:
    get:
      summary: Hall of Fame leaderboard
      description: Leaderboard for 5 categories of miners/participants.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  top_miners:
                    type: array
                    items:
                      type: object
              example:
                top_miners: []

  /api/fee_pool:
    get:
      summary: Fee pool statistics
      description: RIP-301 fee pool statistics (fees recycled to mining pool).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  description:
                    type: string
                  destination:
                    type: string
                  destination_balance_rtc:
                    type: number
                  rip:
                    type: integer
                  total_fee_events:
                    type: integer
                  total_fees_collected_rtc:
                    type: number
                  withdrawal_fee_rtc:
                    type: number
              example:
                description: "Fee Pool Statistics"
                destination: "founder_community"
                destination_balance_rtc: 83246.13
                rip: 301
                total_fee_events: 0
                total_fees_collected_rtc: 0
                withdrawal_fee_rtc: 0.01

  /balance:
    get:
      summary: Miner balance lookup
      description: Returns the RTC balance for a specific miner ID.
      parameters:
        - name: miner_id
          in: query
          required: true
          schema:
            type: string
          description: Miner ID or public key
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: number
              example:
                balance: 150.5

  /lottery/eligibility:
    get:
      summary: Epoch eligibility check
      description: Checks if a miner is eligible for the current epoch block lottery.
      parameters:
        - name: miner_id
          in: query
          required: true
          schema:
            type: string
          description: Miner ID or public key
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  eligible:
                    type: boolean
                  reason:
                    type: string
                  rotation_size:
                    type: integer
                  slot:
                    type: integer
              example:
                eligible: false
                reason: "not_attested"
                rotation_size: 20
                slot: 13227

  /explorer:
    get:
      summary: Block explorer page
      description: Returns the HTML page for the block explorer.
      responses:
        '200':
          description: HTML page returned
          content:
            text/html:
              schema:
                type: string
              example: "<html>...</html>"

  /attest/submit:
    post:
      summary: Submit hardware attestation
      description: Submit an attestation proof. Requires X-Admin-Key.
      security:
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                miner_id:
                  type: string
                proof:
                  type: string
      responses:
        '200':
          description: Attestation accepted

  /wallet/transfer/signed:
    post:
      summary: Ed25519 signed transfer
      description: Submit a signed transfer transaction. Requires X-Admin-Key.
      security:
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tx_payload:
                  type: string
                signature:
                  type: string
      responses:
        '200':
          description: Transfer accepted

  /wallet/transfer:
    post:
      summary: Admin transfer
      description: Transfer funds directly as admin. Requires X-Admin-Key.
      security:
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                to:
                  type: string
                amount:
                  type: number
      responses:
        '200':
          description: Transfer executed

  /withdraw/request:
    post:
      summary: Withdrawal request
      description: Request a withdrawal. Requires X-Admin-Key.
      security:
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                miner_id:
                  type: string
                amount:
                  type: number
      responses:
        '200':
          description: Withdrawal requested

components:
  securitySchemes:
    AdminKeyAuth:
      type: apiKey
      in: header
      name: X-Admin-Key
