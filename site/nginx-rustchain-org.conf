server {
    if ($host = www.rustchain.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = rustchain.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name rustchain.org www.rustchain.org;
    return 404; # managed by Certbot




}