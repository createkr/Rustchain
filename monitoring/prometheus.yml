global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: 'rustchain-monitor'

scrape_configs:
  - job_name: 'rustchain-exporter'
    static_configs:
      - targets: ['rustchain-exporter:9100']
        labels:
          group: 'production'
    
    # Relabel configs for better metric organization
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\d+'
        replacement: '${1}'
    
    # Scrape timeout
    scrape_timeout: 10s
    
    # Metric relabeling to drop unnecessary metrics
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'go_.*'
        action: drop
      - source_labels: [__name__]
        regex: 'promhttp_.*'
        action: drop

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# Alerting rules
rule_files:
  - '/etc/prometheus/alerts.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      # Uncomment to enable Alertmanager
      # - static_configs:
      #     - targets: ['alertmanager:9093']
      # scheme: http
      # timeout: 10s
